</head>


<body>

<!-- Signup -->


<div class="login-page">


<div class="login-card">



<div class="login-logo">


<img src="logo.png">


<span>
PureTalk <b>AI</b>
</span>


</div>




<h2>
Create Account
</h2>


<p>
Join PureTalk AI and start safe conversations
</p>





<form>



<div class="input-box">

<label>
Full Name
</label>


<input 
type="text"
placeholder="Enter your name">

</div>





<div class="input-box">

<label>
Email
</label>


<input 
type="email"
placeholder="Enter your email">

</div>
<div class="input-box">

<label>
Enter OTP
</label>


<input 
type="text"
maxlength="6"
placeholder="Enter 6 digit OTP">

</div>


<div class="otp-text">

<p>
Didn't receive OTP?
<a href="#">
Resend OTP
</a>
</p>

</div>




<div class="input-box">

<label>
Password
</label>


<input 
type="password"
placeholder="Create password">

</div>





<div class="input-box">

<label>
Confirm Password
</label>


<input 
type="password"
placeholder="Confirm password">

</div>





<button class="login-btn">

Create Account

</button>





</form>






<div class="signup">


Already have an account?


<a href="login.html">

Login

</a>


</div>




</div>



</div>





</body>

</html>
